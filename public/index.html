<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DeepSeek Chat</title>

  <style>
/* =========================
   🌸 全局基础升级
========================= */
body{
    margin:0;
    min-height:100vh;
    overflow:hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;

    background: linear-gradient(135deg,#0f172a,#1e1b4b,#0b1020);
    transition: all 0.6s ease;
}

/* =========================
   🌸 二次元背景系统
========================= */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background-size:cover;
    background-position:center;
    opacity:0.22;
    z-index:-2;
    filter: saturate(1.2) contrast(1.05);
    transition:0.6s;
}

/* 默认二次元 */
body.bg-anime::before{
    background-image:url("https://images.unsplash.com/photo-1541562232579-512a21360020");
}

/* 夜景 */
body.bg-night::before{
    background-image:url("https://images.unsplash.com/photo-1500375592092-40eb2168fd21");
}

/* 星空 */
body.bg-space::before{
    background-image:url("https://images.unsplash.com/photo-1446776811953-b23d57bd21aa");
}

/* 城市 */
body.bg-city::before{
    background-image:url("https://images.unsplash.com/photo-1477959858617-67f85cf4f1df");
}

/* 暗层保证可读性 */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background: radial-gradient(circle at top, rgba(0,0,0,0.2), rgba(0,0,0,0.85));
    z-index:-1;
}

/* =========================
   💎 毛玻璃统一升级
========================= */
#history,
.input-inner,
#settings,
#donateCard,
.controls-panel,
#sessionPanel{
    backdrop-filter: blur(22px);
    background: rgba(20,20,25,0.55) !important;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    border-radius: 18px;
}

/* =========================
   📌 顶栏
========================= */
#topbar{
    backdrop-filter: blur(20px);
    background: rgba(0,0,0,0.25);
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* =========================
   💬 消息气泡
========================= */
.message,
.user,
.assistant{
    border-radius:18px;
    padding:12px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    transition:0.2s;
}

.message:hover{
    transform: translateY(-1px);
}

/* =========================
   ✨ 输入框升级
========================= */
.input-inner {
    background: rgba(30,30,35,0.75) !important;
    border-radius: 30px;
    padding: 8px 14px;
    display:flex;
    gap:10px;
    align-items:center;
}

textarea#msg{
    flex:1;
    border:none;
    outline:none;
    background:transparent;
    color:white;
    font-size:16px;
    resize:none;
}

/* =========================
   🔘 按钮升级
========================= */
button{
    border:none;
    border-radius:999px;
    padding:8px 14px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

#sendBtn{
    background: linear-gradient(135deg,#7c3aed,#4f46e5);
    color:white;
    box-shadow: 0 4px 20px rgba(124,58,237,0.4);
}

#sendBtn:hover{
    transform: scale(1.08);
}

/* =========================
   🎛 背景按钮
========================= */
.bg-option{
    background: rgba(255,255,255,0.08);
    color:white;
}

.bg-option.active{
    background:#7c3aed;
}

/* =========================
   📱 mobile优化
========================= */
@media(max-width:600px){
  #history{padding:10px;}
  .message{max-width:95%;}
}
  </style>
</head>

<body class="bg-anime">

<div id="app">

  <!-- 顶栏 -->
  <div id="topbar">
    <div class="topbar-shell">
      <div class="topbar-scroll" id="topbarScroll">
        <div class="topbar-inner">

          <button class="iconbtn" id="sessionBtn">💬</button>
          <button class="iconbtn" id="donateBtn">☕</button>

          <a href="https://github.com/MallocPointer/unlimited-ai" target="_blank" class="iconbtn">GitHub</a>

          <button class="iconbtn" id="settingsBtn">⚙️</button>

        </div>
      </div>
    </div>
  </div>

  <!-- 聊天 -->
  <div id="history">
    <div class="chat" id="chat">
      <div class="message">🌸 二次元 AI Chat UI 已启动</div>
      <div id="bottom-spacer"></div>
    </div>
  </div>

  <!-- 输入 -->
  <div class="input-floating">
    <div class="input-inner">
      <textarea id="msg" rows="1" placeholder="发送消息..."></textarea>
      <button id="sendBtn">发送</button>
    </div>
  </div>

  <!-- 控制面板（背景切换） -->
  <div class="controls-panel" id="controlsPanel">

    <div class="bg-selector">
      <span>🎨 背景：</span>

      <button class="bg-option active" data-bg="bg-anime">二次元</button>
      <button class="bg-option" data-bg="bg-night">夜景</button>
      <button class="bg-option" data-bg="bg-space">星空</button>
      <button class="bg-option" data-bg="bg-city">城市</button>
      <button class="bg-option" data-bg="default">默认</button>

    </div>
  </div>

</div>

<script src="/config.js"></script>
<script src="/app.js"></script>

<script>
// =========================
// 🌸 背景系统
// =========================
function setBG(mode){
    document.body.classList.remove("bg-anime","bg-night","bg-space","bg-city");

    if(mode !== "default"){
        document.body.classList.add(mode);
    }

    localStorage.setItem("bg_mode", mode);
}

// 初始化
window.addEventListener("load",()=>{
    const bg = localStorage.getItem("bg_mode") || "bg-anime";
    setBG(bg);

    document.querySelectorAll(".bg-option").forEach(btn=>{
        btn.addEventListener("click",()=>{
            document.querySelectorAll(".bg-option").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
            setBG(btn.dataset.bg);
        });
    });
});
</script>

</body>
</html>
