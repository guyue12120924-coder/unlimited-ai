<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DeepSeek Chat</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
/* ===== 全局重置 ===== */
* {
  box-sizing: border-box;
}

body{
  margin:0;
  min-height:100vh;
  overflow:hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
}

/* 毛玻璃效果（保留） */
#history,
.input-inner,
#settings,
#donateCard{
  backdrop-filter: blur(20px);
  background: rgba(20,20,20,0.45) !important;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

/* 聊天气泡优化 */
.message,
.user,
.assistant{
  border-radius:18px;
  padding:12px;
}

/* 顶栏 */
#topbar{
  backdrop-filter: blur(16px);
  background: rgba(0,0,0,0.25);
}

/* 控制栏折叠样式 */
.controls-panel {
  transition: all 0.2s ease;
}
.collapse-btn {
  transition: transform 0.2s;
}
.controls-panel.collapsed {
  padding: 6px 10px;
  gap: 0;
}
.controls-panel.collapsed .bg-selector-wrapper {
  display: none;
}
.controls-panel.collapsed .collapse-btn {
  transform: rotate(180deg);
}

/* 字体变量 */
:root {
  --chat-font-size: 15px;
}
.bubble, .bubble * {
  font-size: var(--chat-font-size);
}

/* ===== 美化输入框区域（ChatGPT风格） ===== */
.input-floating {
  position: fixed;
  bottom: var(--composer-gap, 18px);
  left: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  pointer-events: none;
}

.input-inner {
  pointer-events: auto;
  width: 100%;
  max-width: 760px;
  margin: 0 14px;
  background: rgba(32,32,36,0.8) !important;
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 32px;
  padding: 8px 12px 8px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-inner:focus-within {
  border-color: rgba(79,70,229,0.6);
  box-shadow: 0 0 0 3px rgba(79,70,229,0.2);
}

textarea#msg {
  flex: 1;
  resize: none;
  border: none;
  outline: none;
  background: transparent;
  color: #fff;
  font-size: 16px;
  line-height: 1.5;
  padding: 10px 0;
  max-height: 200px;
  font-family: inherit;
}

textarea#msg::placeholder {
  color: rgba(255,255,255,0.5);
}

/* 发送按钮和停止按钮 */
#sendBtn, #stopBtn {
  border: none;
  border-radius: 28px;
  padding: 8px 20px;
  font-weight: 500;
  font-size: 14px;
  cursor: pointer;
  transition: 0.2s;
  background: #4f46e5;
  color: white;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

#sendBtn:hover {
  background: #6366f1;
  transform: scale(1.02);
}

#stopBtn {
  background: #dc2626;
  display: none;
}

#stopBtn:hover {
  background: #b91c1c;
}

/* 底部提示文字（可选） */
.composer-hint {
  text-align: center;
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  margin-top: 8px;
  pointer-events: none;
}

/* 会话侧边栏样式（保持原有） */
#sessionPanel {
  position: fixed;
  top: 0;
  left: -300px;
  width: 280px;
  height: 100%;
  background: rgba(20,20,30,0.95);
  backdrop-filter: blur(16px);
  border-right: 1px solid #333;
  z-index: 1100;
  transition: left 0.2s ease;
  display: flex;
  flex-direction: column;
  padding: 16px;
  box-sizing: border-box;
}
#sessionPanel.open {
  left: 0;
}
.session-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.session-list {
  flex: 1;
  overflow-y: auto;
}
.session-item {
  padding: 10px 12px;
  margin: 4px 0;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.05);
}
.session-item.active {
  background: #4f46e5;
}
.session-title {
  flex: 1;
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.session-actions button {
  background: none;
  border: none;
  color: #ccc;
  cursor: pointer;
  margin-left: 8px;
}
.new-session-btn {
  background: #4f46e5;
  border: none;
  padding: 10px;
  border-radius: 20px;
  color: white;
  margin-top: 16px;
  cursor: pointer;
}
#sessionOverlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1050;
  display: none;
}

/* 控制栏按钮样式微调 */
.ctrl-btn, .bg-option {
  background: rgba(255,255,255,0.1);
  border: none;
  border-radius: 999px;
  padding: 6px 14px;
  font-size: 13px;
  transition: 0.2s;
}
.ctrl-btn:hover, .bg-option:hover {
  background: rgba(255,255,255,0.2);
}
.bg-option.active {
  background: #4f46e5;
  color: white;
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="topbar-shell">
      <div class="topbar-scroll" id="topbarScroll">
        <div class="topbar-inner">
          <button class="iconbtn" id="sessionBtn" title="会话管理">💬</button>
          <button class="iconbtn" id="donateBtn" title="打赏 / Donate"><span class="emoji">☕</span></button>
          <a href="https://github.com/MallocPointer/unlimited-ai" target="_blank" class="iconbtn" id="githubBtn" style="text-decoration: none;" title="GitHub 开源地址">
            <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
            </svg>
          </a>
          <div class="pill model-pill"><label for="modelSel" class="model-label">Model</label><select id="modelSel"></select></div>
          <button class="iconbtn" id="personaToggle" title="😈=使用内置人物扮演 | 😇=不使用内置">😈</button>
          <button class="iconbtn" id="settingsBtn" title="Settings">⚙️</button>
        </div>
      </div>
    </div>
  </div>

  <div id="history">
    <div class="chat" id="chat">
      <div id="bottom-spacer"></div>
    </div>
  </div>

  <div class="input-floating">
    <div class="input-inner" id="composer">
      <textarea id="msg" rows="1" placeholder="发送消息..."></textarea>
      <button id="sendBtn">发送</button>
      <button id="stopBtn">停止</button>
    </div>
    <!-- 可选底部提示 -->
    <div class="composer-hint">DeepSeek 可提供帮助，请理性使用</div>
  </div>

  <div id="settingsMask">…（保持原有内容不变，省略节省篇幅，实际请保留原 settingsMask 完整结构）…</div>
  <div id="donateMask">…（保持原样）…</div>

  <!-- 控制面板（保留原有） -->
  <div class="controls-panel" id="controlsPanel">
    <button id="collapseToggle" class="ctrl-btn collapse-btn">▲</button>
    <div class="bg-selector-wrapper" id="bgSelectorWrapper">
      <button id="themeToggle" class="ctrl-btn">🌙 黑夜模式</button>
      <div class="bg-selector">
        <span>🎨 背景：</span>
        <button data-bg="gradient" class="bg-option active">动态渐变</button>
        <button data-bg="light" class="bg-option">浅色纹理</button>
        <button data-bg="ocean" class="bg-option">海洋</button>
        <button data-bg="forest" class="bg-option">森林</button>
        <button data-bg="custom" class="bg-option">自定义颜色</button>
        <input type="color" id="customColorPicker" value="#1a2a6c">
      </div>
      <button id="fontDecrease" class="ctrl-btn" title="减小字体">A-</button>
      <button id="fontIncrease" class="ctrl-btn" title="增大字体">A+</button>
    </div>
  </div>

  <!-- 会话侧边栏 -->
  <div id="sessionOverlay"></div>
  <div id="sessionPanel">
    <div class="session-header">
      <strong>会话管理</strong>
      <button id="closeSessionPanel" class="ctrl-btn" style="background:none;">✕</button>
    </div>
    <div class="session-list" id="sessionList"></div>
    <button id="newSessionBtn" class="new-session-btn">➕ 新建会话</button>
  </div>
</div>

<script src="/config.js"></script>
<script src="/app.js"></script>
<script>
  // 折叠控制栏、会话侧边栏控制、字体缩放等逻辑（与之前相同，略）
  window.addEventListener("load", function () {
    const scroller = document.getElementById("topbarScroll");
    if (scroller) scroller.scrollLeft = scroller.scrollWidth;

    // 折叠控制栏
    const controlsPanel = document.getElementById("controlsPanel");
    const collapseToggle = document.getElementById("collapseToggle");
    if (controlsPanel && collapseToggle) {
      const isCollapsed = localStorage.getItem("cfw_panel_collapsed") === "true";
      if (isCollapsed) controlsPanel.classList.add("collapsed");
      collapseToggle.addEventListener("click", (e) => {
        e.stopPropagation();
        controlsPanel.classList.toggle("collapsed");
        localStorage.setItem("cfw_panel_collapsed", controlsPanel.classList.contains("collapsed"));
      });
    }

    // 会话侧边栏控制
    const sessionBtn = document.getElementById("sessionBtn");
    const sessionPanel = document.getElementById("sessionPanel");
    const sessionOverlay = document.getElementById("sessionOverlay");
    const closeSessionPanel = document.getElementById("closeSessionPanel");
    if (sessionBtn && sessionPanel && sessionOverlay) {
      const openPanel = () => { sessionPanel.classList.add("open"); sessionOverlay.style.display = "block"; };
      const closePanel = () => { sessionPanel.classList.remove("open"); sessionOverlay.style.display = "none"; };
      sessionBtn.addEventListener("click", openPanel);
      closeSessionPanel.addEventListener("click", closePanel);
      sessionOverlay.addEventListener("click", closePanel);
    }

    // 字体缩放（自包含）
    let currentFontSize = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--chat-font-size')) || 15;
    const fontDecrease = document.getElementById("fontDecrease");
    const fontIncrease = document.getElementById("fontIncrease");
    if (fontDecrease && fontIncrease) {
      const updateFont = (delta) => {
        let newSize = currentFontSize + delta;
        if (newSize < 12) newSize = 12;
        if (newSize > 20) newSize = 20;
        if (newSize !== currentFontSize) {
          currentFontSize = newSize;
          document.documentElement.style.setProperty('--chat-font-size', currentFontSize + 'px');
          localStorage.setItem("cfw_font_size", currentFontSize);
        }
      };
      fontDecrease.addEventListener("click", () => updateFont(-1));
      fontIncrease.addEventListener("click", () => updateFont(1));
      const saved = localStorage.getItem("cfw_font_size");
      if (saved) {
        currentFontSize = parseFloat(saved);
        document.documentElement.style.setProperty('--chat-font-size', currentFontSize + 'px');
      }
    }
  });
</script>
</body>
</html>
