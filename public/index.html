<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DeepSeek Chat</title>

  <link rel="stylesheet" href="/styles.css" />

  <style>
/* ===== 全局基础 ===== */

:root{
    --chat-font-size: 15px;
}

body{
    margin:0;
    min-height:100vh;
    overflow:hidden;
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        "Helvetica Neue",
        sans-serif;

    background:#080b14;
    color:white;
}

/* ===== 二次元背景系统 ===== */

#anime-bg{
    position:fixed;
    inset:0;

    background-image:
        url("/assets/bg/night.jpg");

    background-size:cover;
    background-position:center;

    z-index:-50;

    animation:
        bgFloat 18s ease-in-out infinite;

    transform-origin:center;
    transition:
        background-image 1s ease,
        filter 1s ease;
}

#anime-overlay{
    position:fixed;
    inset:0;

    background:
        radial-gradient(
            circle at center,
            rgba(20,20,30,0.1),
            rgba(0,0,0,0.65)
        );

    backdrop-filter: blur(2px);

    z-index:-40;
}

#ambient-light{
    position:fixed;
    inset:0;

    background:
        radial-gradient(
            circle at top right,
            rgba(120,120,255,0.18),
            transparent 45%
        ),
        radial-gradient(
            circle at bottom left,
            rgba(255,120,220,0.12),
            transparent 40%
        );

    mix-blend-mode:screen;

    z-index:-30;

    animation:
        ambientPulse 8s ease-in-out infinite;
}

#particle-layer{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:-20;
}

/* ===== Galgame角色层 ===== */

#waifu-layer{
    position:fixed;

    right:2%;
    bottom:0;

    height:100vh;
    width:42vw;

    display:flex;
    align-items:flex-end;
    justify-content:center;

    pointer-events:none;

    z-index:5;
}

#waifu{
    height:92vh;
    max-height:1100px;

    object-fit:contain;

    filter:
        drop-shadow(0 0 25px rgba(120,120,255,0.25))
        drop-shadow(0 0 60px rgba(255,255,255,0.08));

    animation:
        waifuFloat 6s ease-in-out infinite;
}

#waifu-name{
    position:absolute;

    left:50%;
    bottom:110px;

    transform:translateX(-50%);

    padding:8px 18px;

    border-radius:999px;

    background:
        rgba(20,20,30,0.55);

    border:
        1px solid rgba(255,255,255,0.1);

    backdrop-filter: blur(10px);

    font-size:14px;
    letter-spacing:2px;

    color:white;

    box-shadow:
        0 4px 20px rgba(0,0,0,0.3);
}

/* ===== App层 ===== */

#app{
    position:relative;
    z-index:10;
}

/* ===== 毛玻璃 ===== */

#history,
.input-inner,
#settings,
#donateCard,
#sessionPanel{
    backdrop-filter: blur(20px);

    background:
        rgba(18,18,28,0.45) !important;

    border:
        1px solid rgba(255,255,255,0.08);

    box-shadow:
        0 8px 32px rgba(0,0,0,0.35);
}

/* ===== 顶栏 ===== */

#topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;

    z-index:1000;

    backdrop-filter: blur(20px);

    background:
        linear-gradient(
            to bottom,
            rgba(0,0,0,0.45),
            rgba(0,0,0,0.08)
        );

    border-bottom:
        1px solid rgba(255,255,255,0.06);
}

/* ===== 聊天区域 ===== */

#history{
    position:fixed;

    left:2%;
    top:90px;

    width:50%;
    height:calc(100vh - 180px);

    overflow-y:auto;

    border-radius:28px;

    padding:20px;

    box-sizing:border-box;
}

/* ===== 聊天气泡 ===== */

.message,
.user,
.assistant{
    border-radius:20px;

    padding:14px 16px;

    margin-bottom:14px;

    animation:
        messageFade 0.35s ease;

    backdrop-filter: blur(12px);

    border:
        1px solid rgba(255,255,255,0.06);
}

.user{
    background:
        rgba(120,120,255,0.16);
}

.assistant{
    background:
        rgba(255,255,255,0.06);
}

/* ===== 输入区域 ===== */

.input-floating{
    position:fixed;

    left:2%;
    bottom:24px;

    width:50%;

    z-index:100;
}

.input-inner{
    width:100%;

    border-radius:28px;

    padding:8px 14px 8px 18px;

    display:flex;
    align-items:center;
    gap:12px;

    transition:
        border-color 0.25s,
        box-shadow 0.25s,
        transform 0.25s;
}

.input-inner:focus-within{
    border-color:
        rgba(120,120,255,0.45);

    box-shadow:
        0 0 0 3px rgba(120,120,255,0.18),
        0 12px 40px rgba(0,0,0,0.35);

    transform:
        translateY(-2px);
}

textarea#msg{
    flex:1;

    resize:none;

    border:none;
    outline:none;

    background:transparent;

    color:white;

    font-size:16px;
    line-height:1.5;

    padding:12px 0;

    max-height:220px;

    font-family:inherit;
}

textarea#msg::placeholder{
    color:
        rgba(255,255,255,0.45);
}

/* ===== 按钮 ===== */

#sendBtn,
#stopBtn{
    border:none;

    border-radius:999px;

    padding:10px 20px;

    font-weight:600;

    cursor:pointer;

    transition:0.25s;

    background:
        linear-gradient(
            135deg,
            #667eea,
            #764ba2
        );

    color:white;
}

#sendBtn:hover{
    transform:
        translateY(-1px)
        scale(1.03);

    box-shadow:
        0 8px 24px rgba(102,126,234,0.35);
}

#stopBtn{
    background:
        linear-gradient(
            135deg,
            #ff4d6d,
            #c9184a
        );

    display:none;
}

/* ===== AI状态 ===== */

#ai-status{
    margin-top:10px;

    text-align:center;

    font-size:13px;

    color:
        rgba(255,255,255,0.6);

    letter-spacing:1px;

    animation:
        statusPulse 2.5s ease-in-out infinite;
}

/* ===== 控制面板 ===== */

.controls-panel{
    transition:all 0.2s ease;
}

.controls-panel.collapsed{
    padding:6px 10px;
    gap:0;
}

.controls-panel.collapsed .bg-selector-wrapper{
    display:none;
}

/* ===== 会话栏 ===== */

#sessionPanel{
    position:fixed;

    top:0;
    left:-300px;

    width:280px;
    height:100%;

    z-index:1200;

    transition:left 0.25s ease;

    display:flex;
    flex-direction:column;

    padding:16px;

    box-sizing:border-box;
}

#sessionPanel.open{
    left:0;
}

/* ===== 动画 ===== */

@keyframes bgFloat{
    0%{
        transform:
            scale(1)
            translateY(0px);
    }
    50%{
        transform:
            scale(1.03)
            translateY(-8px);
    }
    100%{
        transform:
            scale(1)
            translateY(0px);
    }
}

@keyframes waifuFloat{
    0%{
        transform:
            translateY(0px);
    }
    50%{
        transform:
            translateY(-10px);
    }
    100%{
        transform:
            translateY(0px);
    }
}

@keyframes ambientPulse{
    0%{
        opacity:0.8;
    }
    50%{
        opacity:1;
    }
    100%{
        opacity:0.8;
    }
}

@keyframes messageFade{
    from{
        opacity:0;
        transform:
            translateY(10px);
    }
    to{
        opacity:1;
        transform:
            translateY(0);
    }
}

@keyframes statusPulse{
    0%{
        opacity:0.45;
    }
    50%{
        opacity:1;
    }
    100%{
        opacity:0.45;
    }
}

/* ===== 响应式 ===== */

@media (max-width: 980px){

    #waifu-layer{
        opacity:0.3;
        width:100%;
        right:-10%;
    }

    #history{
        width:94%;
        left:3%;
    }

    .input-floating{
        width:94%;
        left:3%;
    }
}
  </style>
</head>

<body>

<!-- ===== 二次元背景系统 ===== -->

<div id="anime-bg"></div>
<div id="anime-overlay"></div>
<div id="ambient-light"></div>
<div id="particle-layer"></div>

<!-- ===== Galgame角色层 ===== -->

<div id="waifu-layer">

  <img
    id="waifu"
    src="/assets/waifu/night.png"
    alt="waifu"
  />

  <div id="waifu-name">
    星野
  </div>

</div>

<div id="app">

  <div id="topbar">

    <div class="topbar-shell">

      <div class="topbar-scroll" id="topbarScroll">

        <div class="topbar-inner">

          <button class="iconbtn" id="sessionBtn" title="会话管理">
            💬
          </button>

          <button class="iconbtn" id="donateBtn" title="打赏 / Donate">
            ☕
          </button>

          <a
            href="https://github.com/MallocPointer/unlimited-ai"
            target="_blank"
            class="iconbtn"
            id="githubBtn"
            style="text-decoration:none;"
            title="GitHub"
          >
            GitHub
          </a>

          <div class="pill model-pill">
            <label for="modelSel" class="model-label">
              Model
            </label>

            <select id="modelSel"></select>
          </div>

          <button
            class="iconbtn"
            id="personaToggle"
            title="人格切换"
          >
            😈
          </button>

          <button
            class="iconbtn"
            id="settingsBtn"
            title="Settings"
          >
            ⚙️
          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- ===== 聊天区域 ===== -->

  <div id="history">

    <div class="chat" id="chat">
      <div id="bottom-spacer"></div>
    </div>

  </div>

  <!-- ===== 输入区域 ===== -->

  <div class="input-floating">

    <div class="input-inner" id="composer">

      <textarea
        id="msg"
        rows="1"
        placeholder="和星野说点什么..."
      ></textarea>

      <button id="sendBtn">
        发送
      </button>

      <button id="stopBtn">
        停止
      </button>

    </div>

    <div id="ai-status">
      星野正在陪伴你...
    </div>

  </div>

  <!-- ===== Settings ===== -->

  <div id="settingsMask">

    <div id="settings">

      <div id="settingsHeader">
        <h3>Settings</h3>

        <div class="hint">
          所有数据仅保存在本地浏览器
        </div>
      </div>

      <!-- 保留你原本 settings 内容 -->

    </div>

  </div>

  <!-- ===== Donate ===== -->

  <div id="donateMask">

    <div id="donateCard">

      <div id="donateHead">

        <div class="t">
          打赏 / Donate
        </div>

        <button id="donateClose">
          ✕
        </button>

      </div>

      <div id="donateBody">

        <img
          id="donateImg"
          src="/donate.png"
          alt="WeChat Pay QR"
        />

      </div>

    </div>

  </div>

  <!-- ===== 控制面板 ===== -->

  <div class="controls-panel" id="controlsPanel">

    <button
      id="collapseToggle"
      class="ctrl-btn collapse-btn"
    >
      ▲
    </button>

    <div
      class="bg-selector-wrapper"
      id="bgSelectorWrapper"
    >

      <button id="themeToggle" class="ctrl-btn">
        🌙 黑夜模式
      </button>

      <button
        id="fontDecrease"
        class="ctrl-btn"
      >
        A-
      </button>

      <button
        id="fontIncrease"
        class="ctrl-btn"
      >
        A+
      </button>

    </div>

  </div>

  <!-- ===== 会话栏 ===== -->

  <div id="sessionOverlay"></div>

  <div id="sessionPanel">

    <div class="session-header">

      <strong>
        会话管理
      </strong>

      <button
        id="closeSessionPanel"
        class="ctrl-btn"
      >
        ✕
      </button>

    </div>

    <div
      class="session-list"
      id="sessionList"
    ></div>

    <button
      id="newSessionBtn"
      class="new-session-btn"
    >
      ➕ 新建会话
    </button>

  </div>

</div>

<script src="/config.js"></script>
<script src="/app.js"></script>

<script>
window.addEventListener("load", function () {

    const scroller =
        document.getElementById("topbarScroll");

    if (scroller) {
        scroller.scrollLeft =
            scroller.scrollWidth;
    }

    const controlsPanel =
        document.getElementById("controlsPanel");

    const collapseToggle =
        document.getElementById("collapseToggle");

    if (controlsPanel && collapseToggle) {

        const isCollapsed =
            localStorage.getItem(
                "cfw_panel_collapsed"
            ) === "true";

        if (isCollapsed) {
            controlsPanel.classList.add(
                "collapsed"
            );
        }

        collapseToggle.addEventListener(
            "click",
            (e) => {

                e.stopPropagation();

                controlsPanel.classList.toggle(
                    "collapsed"
                );

                const nowCollapsed =
                    controlsPanel.classList.contains(
                        "collapsed"
                    );

                localStorage.setItem(
                    "cfw_panel_collapsed",
                    nowCollapsed
                );
            }
        );
    }

    const sessionBtn =
        document.getElementById("sessionBtn");

    const sessionPanel =
        document.getElementById("sessionPanel");

    const sessionOverlay =
        document.getElementById("sessionOverlay");

    const closeSessionPanel =
        document.getElementById(
            "closeSessionPanel"
        );

    if (
        sessionBtn &&
        sessionPanel &&
        sessionOverlay
    ) {

        const openPanel = () => {

            sessionPanel.classList.add(
                "open"
            );

            sessionOverlay.style.display =
                "block";
        };

        const closePanel = () => {

            sessionPanel.classList.remove(
                "open"
            );

            sessionOverlay.style.display =
                "none";
        };

        sessionBtn.addEventListener(
            "click",
            openPanel
        );

        closeSessionPanel.addEventListener(
            "click",
            closePanel
        );

        sessionOverlay.addEventListener(
            "click",
            closePanel
        );
    }
});
</script>

</body>
</html>
